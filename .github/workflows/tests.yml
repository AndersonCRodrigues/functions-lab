name: Avaliação Automática

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  lint-javascript:
    name: "🔍 Lint JavaScript (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependências
        run: npm install
      - name: Rodar ESLint
        run: npm run lint

  lint-python:
    name: "🔍 Lint Python (Flake8)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar Flake8
        run: pip install flake8
      - name: Rodar Flake8
        run: flake8 challenges.py

  avaliar-javascript:
    name: "🟨 Testes JavaScript (Jest)"
    runs-on: ubuntu-latest
    needs: lint-javascript
    defaults:
      run:
        working-directory: javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependências
        run: npm install
      - name: Rodar testes
        run: npx jest --json --outputFile=../jest-results.json || true
      - name: Upload resultados
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: jest-results.json
      - name: Gerar Job Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('jest-results.json', 'utf8');
            const data = JSON.parse(raw);

            const obrigatorios = [];
            const bonus = [];

            for (const suite of data.testResults) {
              const assertions = suite.assertionResults || [];
              for (const t of assertions) {
                const passed = t.status === 'passed';
                const name = t.ancestorTitles[0] || t.title;
                const num = parseInt(name.match(/\d+/)?.[0] || '0');
                const entry = { name, passed, num };
                if (num >= 11) bonus.push(entry);
                else obrigatorios.push(entry);
              }
            }

            const dedup = (arr) => {
              const map = {};
              for (const e of arr) {
                if (!map[e.name]) map[e.name] = { ...e, passed: true };
                if (!e.passed) map[e.name].passed = false;
              }
              return Object.values(map).sort((a, b) => a.num - b.num);
            };

            const ob = dedup(obrigatorios);
            const bn = dedup(bonus);
            const passedOb = ob.filter(e => e.passed).length;
            const passedBn = bn.filter(e => e.passed).length;
            const pctOb = ob.length ? ((passedOb / ob.length) * 100).toFixed(1) : '0.0';
            const pctTotal = (ob.length + bn.length)
              ? (((passedOb + passedBn) / (ob.length + bn.length)) * 100).toFixed(1)
              : '0.0';
            const desempenho = parseFloat(pctOb) >= 70 ? '✅ Aprovado' : '❌ Insuficiente';

            let summary = `## 📊 Resultado — JavaScript\n\n`;
            summary += `| Item | Resultado |\n|---|---|\n`;
            summary += `| Desempenho | **${desempenho}** |\n`;
            summary += `| Requisitos obrigatórios | **${pctOb}%** (${passedOb}/${ob.length}) |\n`;
            summary += `| Requisitos totais | **${pctTotal}%** |\n\n`;
            summary += `## Resultado por requisito\n\n`;
            summary += `| # | Nome | Avaliação |\n|---|---|:---:|\n`;
            for (const e of ob) {
              summary += `| ${e.num} | ${e.name.replace(/Desafio \d+ - /, '')} | ${e.passed ? '✅' : '❌'} |\n`;
            }
            if (bn.length) {
              summary += `\n### ⭐ Bônus\n\n| # | Nome | Avaliação |\n|---|---|:---:|\n`;
              for (const e of bn) {
                summary += `| ${e.num} | ${e.name.replace(/Desafio \d+ \(Bônus\) - /, '')} | ${e.passed ? '✅' : '❌'} |\n`;
              }
            }
            await core.summary.addRaw(summary).write();

  avaliar-python:
    name: "🐍 Testes Python (pytest)"
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: pip install pytest pytest-json-report
      - name: Rodar testes
        run: pytest --json-report --json-report-file=../pytest-results.json || true
      - name: Upload resultados
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.json
      - name: Gerar Job Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('pytest-results.json', 'utf8');
            const data = JSON.parse(raw);

            const nomes = {
              'TestCompareTrue': 'compareTrue / compare_true',
              'TestCalcArea': 'calcArea / calc_area',
              'TestSplitSentence': 'splitSentence / split_sentence',
              'TestConcatName': 'concatName / concat_name',
              'TestFootballPoints': 'footballPoints / football_points',
              'TestHighestCount': 'highestCount / highest_count',
              'TestCatAndMouse': 'catAndMouse / cat_and_mouse',
              'TestFizzBuzz': 'fizzBuzz / fizz_buzz',
              'TestEncodeDecode': 'encode / decode',
              'TestTechList': 'techList / tech_list',
              'TestGeneratePhoneNumber': 'generatePhoneNumber / generate_phone_number',
              'TestTriangleCheck': 'triangleCheck / triangle_check',
              'TestHydrate': 'hydrate',
            };
            const numeros = {
              'TestCompareTrue': 1, 'TestCalcArea': 2, 'TestSplitSentence': 3,
              'TestConcatName': 4, 'TestFootballPoints': 5, 'TestHighestCount': 6,
              'TestCatAndMouse': 7, 'TestFizzBuzz': 8, 'TestEncodeDecode': 9,
              'TestTechList': 10, 'TestGeneratePhoneNumber': 11,
              'TestTriangleCheck': 12, 'TestHydrate': 13,
            };

            const map = {};
            for (const t of data.tests || []) {
              const className = t.nodeid.split('::')[1] || '';
              if (!map[className]) {
                map[className] = { name: className, passed: true, num: numeros[className] || 0 };
              }
              if (t.outcome !== 'passed') map[className].passed = false;
            }

            const all = Object.values(map).sort((a, b) => a.num - b.num);
            const ob = all.filter(e => e.num < 11);
            const bn = all.filter(e => e.num >= 11);
            const passedOb = ob.filter(e => e.passed).length;
            const passedBn = bn.filter(e => e.passed).length;
            const pctOb = ob.length ? ((passedOb / ob.length) * 100).toFixed(1) : '0.0';
            const pctTotal = (ob.length + bn.length)
              ? (((passedOb + passedBn) / (ob.length + bn.length)) * 100).toFixed(1)
              : '0.0';
            const desempenho = parseFloat(pctOb) >= 70 ? '✅ Aprovado' : '❌ Insuficiente';

            let summary = `## 📊 Resultado — Python\n\n`;
            summary += `| Item | Resultado |\n|---|---|\n`;
            summary += `| Desempenho | **${desempenho}** |\n`;
            summary += `| Requisitos obrigatórios | **${pctOb}%** (${passedOb}/${ob.length}) |\n`;
            summary += `| Requisitos totais | **${pctTotal}%** |\n\n`;
            summary += `## Resultado por requisito\n\n`;
            summary += `| # | Nome | Avaliação |\n|---|---|:---:|\n`;
            for (const e of ob) {
              summary += `| ${e.num} | ${nomes[e.name] || e.name} | ${e.passed ? '✅' : '❌'} |\n`;
            }
            if (bn.length) {
              summary += `\n### ⭐ Bônus\n\n| # | Nome | Avaliação |\n|---|---|:---:|\n`;
              for (const e of bn) {
                summary += `| ${e.num} | ${nomes[e.name] || e.name} | ${e.passed ? '✅' : '❌'} |\n`;
              }
            }
            await core.summary.addRaw(summary).write();

  comentar-no-pr:
    name: "💬 Comentar no PR"
    needs: [avaliar-javascript, avaliar-python]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download jest-results
        uses: actions/download-artifact@v4
        with:
          name: jest-results
        continue-on-error: true

      - name: Download pytest-results
        uses: actions/download-artifact@v4
        with:
          name: pytest-results
        continue-on-error: true

      - name: Comentar resultado no PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const jsLint = '${{ needs.lint-javascript.result }}';
            const pyLint = '${{ needs.lint-python.result }}';
            const jsTest = '${{ needs.avaliar-javascript.result }}';
            const pyTest = '${{ needs.avaliar-python.result }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            const buildJsTable = () => {
              try {
                const data = JSON.parse(fs.readFileSync('jest-results.json', 'utf8'));
                const map = {};
                for (const suite of data.testResults) {
                  for (const t of (suite.assertionResults || [])) {
                    const name = t.ancestorTitles[0] || t.title;
                    const num = parseInt(name.match(/\d+/)?.[0] || '0');
                    if (!map[name]) map[name] = { name, passed: true, num };
                    if (t.status !== 'passed') map[name].passed = false;
                  }
                }
                const rows = Object.values(map).sort((a, b) => a.num - b.num);
                if (!rows.length) return '';
                let t = '\n\n<details><summary>📋 Detalhes JavaScript</summary>\n\n';
                t += '| # | Desafio | Resultado |\n|---|---|:---:|\n';
                for (const r of rows) {
                  t += `| ${r.num} | ${r.name.replace(/Desafio \d+ (\(Bônus\) )?- /, '')} | ${r.passed ? '✅' : '❌'} |\n`;
                }
                return t + '\n</details>';
              } catch (_) { return ''; }
            };

            const buildPyTable = () => {
              try {
                const data = JSON.parse(fs.readFileSync('pytest-results.json', 'utf8'));
                const nomes = {
                  'TestCompareTrue': 'compare_true', 'TestCalcArea': 'calc_area',
                  'TestSplitSentence': 'split_sentence', 'TestConcatName': 'concat_name',
                  'TestFootballPoints': 'football_points', 'TestHighestCount': 'highest_count',
                  'TestCatAndMouse': 'cat_and_mouse', 'TestFizzBuzz': 'fizz_buzz',
                  'TestEncodeDecode': 'encode / decode', 'TestTechList': 'tech_list',
                  'TestGeneratePhoneNumber': 'generate_phone_number',
                  'TestTriangleCheck': 'triangle_check', 'TestHydrate': 'hydrate',
                };
                const numeros = {
                  'TestCompareTrue': 1, 'TestCalcArea': 2, 'TestSplitSentence': 3,
                  'TestConcatName': 4, 'TestFootballPoints': 5, 'TestHighestCount': 6,
                  'TestCatAndMouse': 7, 'TestFizzBuzz': 8, 'TestEncodeDecode': 9,
                  'TestTechList': 10, 'TestGeneratePhoneNumber': 11,
                  'TestTriangleCheck': 12, 'TestHydrate': 13,
                };
                const map = {};
                for (const t of (data.tests || [])) {
                  const cls = t.nodeid.split('::')[1] || '';
                  if (!map[cls]) map[cls] = { name: cls, passed: true, num: numeros[cls] || 0 };
                  if (t.outcome !== 'passed') map[cls].passed = false;
                }
                const rows = Object.values(map).sort((a, b) => a.num - b.num);
                if (!rows.length) return '';
                let t = '\n\n<details><summary>📋 Detalhes Python</summary>\n\n';
                t += '| # | Desafio | Resultado |\n|---|---|:---:|\n';
                for (const r of rows) {
                  t += `| ${r.num} | ${nomes[r.name] || r.name} | ${r.passed ? '✅' : '❌'} |\n`;
                }
                return t + '\n</details>';
              } catch (_) { return ''; }
            };

            const body = [
              '## 🤖 Resultado da Avaliação Automática',
              '',
              '| Etapa | JavaScript | Python |',
              '|---|:---:|:---:|',
              `| 🔍 Lint | ${icon(jsLint)} | ${icon(pyLint)} |`,
              `| 🧪 Testes | ${icon(jsTest)} | ${icon(pyTest)} |`,
              '',
              '> ⚠️ Os testes só rodam se o lint passar.',
              '> Para ver percentuais detalhados, clique em **Details** ao lado de cada check.',
              buildJsTable(),
              buildPyTable(),
            ].join('\n');

            // Remove comentário anterior do bot para não acumular
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes('Resultado da Avaliação Automática')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });